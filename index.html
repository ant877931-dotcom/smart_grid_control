<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grid Monitor - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.rawgit.com/Mikhus/canvas-gauges/master/gauge.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="brand">
                <h1>⚡ SMART-GRID <span style="color:#2563eb">MONITOR</span></h1>
                <div id="live-clock">--:--:--</div>
            </div>
            <div class="header-actions">
                <button id="btn-toggle-settings" class="btn-outline">⚙️ PARAMETER</button>
            </div>
        </header>

        <section class="gauge-grid">
            <div class="gauge-card"><canvas id="gauge-v"></canvas><div class="gauge-label">TEGANGAN (V)</div></div>
            <div class="gauge-card"><canvas id="gauge-i"></canvas><div class="gauge-label">ARUS (A)</div></div>
            <div class="gauge-card"><canvas id="gauge-p"></canvas><div class="gauge-label">DAYA NYATA (WATT)</div></div>
            <div class="gauge-card"><canvas id="gauge-s"></canvas><div class="gauge-label">DAYA SEMU (VA)</div></div>
        </section>

        <section id="settings-panel" class="settings-card hidden">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <h3>⚙️ Batas Proteksi Fuzzy</h3>
                <button id="btn-save-settings" class="btn-primary">SIMPAN KE ALAT</button>
            </div>
            <div class="settings-grid">
                <div class="config-group">
                    <label>Rentang Aman Normal (V)</label>
                    <div class="input-range-box">
                        <input type="number" id="v-aman-min" value="198">
                        <span class="range-sep">-</span>
                        <input type="number" id="v-aman-max" value="231">
                    </div>
                </div>
                <div class="config-group">
                    <label>Waspada Bawah/Atas (V)</label>
                    <div class="input-range-box">
                        <input type="number" id="v-waspada-l" value="188">
                        <span class="range-sep">|</span>
                        <input type="number" id="v-waspada-h" value="241">
                    </div>
                </div>
            </div>
        </section>

        <footer class="status-box">
            <small>SISTEM STATUS</small>
            <h2 id="alert-text">MENGHUBUNGKAN...</h2>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
